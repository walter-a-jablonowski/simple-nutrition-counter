#
# Amino acids
#

name:        Amino acids
short:       amino
unit:        g
defaultUnit: mg
comment:     "Increased need if doing sports"
sources:

  - title: "Essential (Claude and ChatGPT produce exactly same list 2408)"

amounts:  # currently we use the first entry hard coded only

  # added date from interview

  - criteria: { gender: male, age: 40, height: "*", weight: 75 }
    lower:  5%
    amount: 60     # 0.8g per kg body weight
    upper:  5%

  - criteria: { dayType: workout, gender: male, age: 40, height: "*", weight: 75 }
    lower:  120
    amount: 142.5  # 1.6,1.8-2.2g = min 120, 135 - 165
    upper:  165

substances:

  # Targets below = WHO essential-AA requirement (mg/kg/day) x 75 kg body weight.
  # TASK: replace with better absolute reference values later (source TBD)

  Histidine:

    short:     HIS
    essential: true  # TASK: babies only?
    sources:   "WHO (Wikipedia) for now"
    amounts:

      - criteria: { gender: male, age: 40, weight: 75, height: "*" }
        lower:  10%
        amount: 750  # 10 mg/kg x 75 kg
        upper:  10%

